<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Freiburger Hausverwaltung — Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/tokens.jsx"></script>
  <script type="text/babel" src="src/content.jsx"></script>
  <script type="text/babel" src="src/shapes.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/hero-a.jsx"></script>
  <script type="text/babel" src="src/hero-b.jsx"></script>
  <script type="text/babel" src="src/prototype.jsx"></script>

  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "breisgau",
      "type": "editorial"
    }/*EDITMODE-END*/;

    function App() {
      const [tweakOpen, setTweakOpen] = React.useState(false);
      const [themeKey, setThemeKey] = React.useState(TWEAKS.theme || 'breisgau');
      const [typeKey, setTypeKey] = React.useState(TWEAKS.type || 'editorial');

      const theme = FHV_THEMES[themeKey] || FHV_THEMES.breisgau;
      const type = FHV_TYPE[typeKey] || FHV_TYPE.editorial;

      // Tweaks host integration
      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e.data || typeof e.data !== 'object') return;
          if (e.data.type === '__activate_edit_mode') setTweakOpen(true);
          if (e.data.type === '__deactivate_edit_mode') setTweakOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const persist = (edits) => {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      };

      const onTheme = (k) => { setThemeKey(k); persist({ theme: k }); };
      const onType = (k) => { setTypeKey(k); persist({ type: k }); };

      return (
        <>
          <DesignCanvas>
            <DCSection id="homepage" title="Homepage — Freiburger Hausverwaltung"
              subtitle="Zwei Richtungen · warm, regional, professionell · klicken zum Fokussieren">
              <DCArtboard id="a" label="A · Editorial (type-led)" width={1280} height={900}>
                <HomepagePrototype variant="a" theme={theme} type={type} />
              </DCArtboard>
              <DCArtboard id="b" label="B · Regional (split hero)" width={1280} height={900}>
                <HomepagePrototype variant="b" theme={theme} type={type} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          {tweakOpen && (
            <TweaksPanel
              themeKey={themeKey} typeKey={typeKey}
              onTheme={onTheme} onType={onType}
              onClose={() => setTweakOpen(false)} />
          )}
        </>
      );
    }

    function TweaksPanel({ themeKey, typeKey, onTheme, onType, onClose }) {
      return (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, zIndex: 1000,
          width: 300, background: '#faf9f5',
          border: '1px solid rgba(0,0,0,0.1)',
          boxShadow: '0 20px 60px rgba(0,0,0,0.18)',
          fontFamily: "'Source Serif 4', Georgia, serif",
          color: '#1a1a1a',
        }}>
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid rgba(0,0,0,0.08)',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <div style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }}>Tweaks</div>
            <button onClick={onClose} style={{
              border: 'none', background: 'transparent', cursor: 'pointer',
              fontSize: 18, color: '#888', lineHeight: 1,
            }}>×</button>
          </div>
          <div style={{ padding: 18 }}>
            <div style={{ fontSize: 10, letterSpacing: '0.16em', color: '#888', marginBottom: 10, fontFamily: "'JetBrains Mono', monospace" }}>
              FARBWELT
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 20 }}>
              {Object.entries(FHV_THEMES).map(([k, t]) => (
                <button key={k} onClick={() => onTheme(k)}
                  style={{
                    padding: 8, cursor: 'pointer',
                    border: themeKey === k ? `2px solid ${t.primary}` : '1px solid rgba(0,0,0,0.1)',
                    background: t.surface, fontFamily: 'inherit', textAlign: 'left',
                  }}>
                  <div style={{ display: 'flex', gap: 3, marginBottom: 6 }}>
                    <span style={{ width: 14, height: 14, background: t.primary }} />
                    <span style={{ width: 14, height: 14, background: t.accent }} />
                    <span style={{ width: 14, height: 14, background: t.warm }} />
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 500 }}>{t.name}</div>
                </button>
              ))}
            </div>

            <div style={{ fontSize: 10, letterSpacing: '0.16em', color: '#888', marginBottom: 10, fontFamily: "'JetBrains Mono', monospace" }}>
              TYPOGRAFIE
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {Object.entries(FHV_TYPE).map(([k, t]) => (
                <button key={k} onClick={() => onType(k)}
                  style={{
                    padding: '10px 12px', cursor: 'pointer', textAlign: 'left',
                    border: typeKey === k ? '2px solid #2a3f5f' : '1px solid rgba(0,0,0,0.1)',
                    background: typeKey === k ? '#f1f0ec' : 'transparent',
                    fontFamily: t.display,
                  }}>
                  <div style={{ fontSize: 20, fontWeight: t.displayWeight, letterSpacing: t.displayTracking }}>
                    {t.name}
                  </div>
                  <div style={{ fontSize: 11, color: '#888', marginTop: 2, fontFamily: "'Source Serif 4', serif" }}>
                    {k === 'editorial' ? 'Fraunces + Source Serif' : 'Cormorant + Lora'}
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
